openapi: 3.1.0

info:
  title: PLANT System API
  version: 1.0.0

servers:
  - url: http://127.0.0.1:8000
    description: 本機開發環境

security: []

tags:
  - name: Bootstrap
    description: 前端初始化資料
  - name: Projects
    description: 專案生命週期與成本摘要
  - name: References
    description: 專案參考文件管理
  - name: Artifacts
    description: 專案產物與檔案預覽
  - name: Runs
    description: Agent 執行、事件、人工決策與取消
  - name: Configuration
    description: 系統設定
  - name: Secrets
    description: 模型 API Key 與啟動碼
  - name: Health
    description: 後端健康狀態
  - name: Public Manual
    description: 公開說明文件與產物檔案

paths:
  /api/bootstrap:
    get:
      tags: [Bootstrap]
      summary: 取得前端初始化資料
      operationId: getBootstrap
      security:
        - ActivationCookie: []
        - {}
      responses:
        "200":
          description: 初始化資料
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/projects:
    post:
      tags: [Projects]
      summary: 建立專案
      operationId: createProject
      security:
        - ActivationCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreate"
            example:
              rough_idea: 建立一個訂餐外送需求開發專案
      responses:
        "200":
          description: 專案建立成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/projects/{project_id}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Projects]
      summary: 取得專案 Artifact
      operationId: getProject
      security:
        - ActivationCookie: []
        - {}
      responses:
        "200":
          description: 專案資料
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Projects]
      summary: 刪除專案
      operationId: deleteProject
      security:
        - ActivationCookie: []
      responses:
        "200":
          description: 專案刪除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteProjectResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/projects/{project_id}/cost-summary:
    get:
      tags: [Projects]
      summary: 取得專案成本摘要
      operationId: getProjectCostSummary
      security:
        - ActivationCookie: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: 成本摘要
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostSummaryResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/projects/{project_id}/references:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [References]
      summary: 列出專案參考文件
      operationId: listProjectReferences
      security:
        - ActivationCookie: []
        - {}
      responses:
        "200":
          description: 參考文件列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferenceListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [References]
      summary: 上傳專案參考文件
      operationId: uploadProjectReference
      security:
        - ActivationCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: 上傳成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferenceMutationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/projects/{project_id}/references/{name}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ReferenceName"
    get:
      tags: [References]
      summary: 下載或預覽參考文件
      operationId: downloadProjectReference
      security:
        - ActivationCookie: []
        - {}
      parameters:
        - $ref: "#/components/parameters/Inline"
      responses:
        "200":
          $ref: "#/components/responses/BinaryFile"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [References]
      summary: 刪除參考文件
      operationId: deleteProjectReference
      security:
        - ActivationCookie: []
      responses:
        "200":
          description: 刪除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferenceMutationResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /{project_id}/references/{name}:
    get:
      tags: [References]
      summary: 透過公開路徑下載或預覽參考文件
      operationId: publicDownloadProjectReference
      security:
        - ActivationCookie: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ReferenceName"
        - $ref: "#/components/parameters/Inline"
      responses:
        "200":
          $ref: "#/components/responses/BinaryFile"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/projects/{project_id}/artifacts:
    get:
      tags: [Artifacts]
      summary: 取得專案檔案樹
      operationId: getProjectArtifactTree
      security:
        - ActivationCookie: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: 檔案樹
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactTreeResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/projects/{project_id}/files:
    get:
      tags: [Artifacts]
      summary: 讀取專案檔案
      operationId: readProjectFile
      security:
        - ActivationCookie: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: path
          in: query
          required: true
          description: 相對於專案目錄的檔案路徑
          schema:
            type: string
          example: artifact/requirements.json
      responses:
        "200":
          description: 檔案內容或 Base64 圖片
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/runs:
    get:
      tags: [Runs]
      summary: 列出執行紀錄
      operationId: listRuns
      security:
        - ActivationCookie: []
        - {}
      parameters:
        - name: project_id
          in: query
          required: false
          schema:
            type: string
          description: 限定單一專案；未提供時列出可讀取的執行紀錄
      responses:
        "200":
          description: 執行紀錄
          content:
            application/json:
              schema:
                type: object
                required: [runs]
                properties:
                  runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/RunState"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Runs]
      summary: 建立 Agent 執行
      operationId: createRun
      security:
        - ActivationCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunCreate"
            example:
              project_id: "173949223214"
              mode: new
              rounds: 2
              rough_idea: 建立訂餐外送系統
              attached_reference_paths: ["173949223214/規定.docx"]
      responses:
        "200":
          description: Run 已排入執行
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunState"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/runs/{run_id}/events:
    get:
      tags: [Runs]
      summary: 取得 Run 事件或訂閱 SSE
      description: |
        `Accept: application/json` 時回傳 JSON；其他情況以 `text/event-stream` 持續推送事件。
      operationId: getRunEvents
      security:
        - ActivationCookie: []
        - {}
      parameters:
        - $ref: "#/components/parameters/RunId"
        - name: since
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: 從指定事件 ID 開始讀取
      responses:
        "200":
          description: JSON 事件列表或 SSE 串流
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunEventsResponse"
            text/event-stream:
              schema:
                type: string
              example: "event: workspace_event\ndata: {\"id\":1,\"type\":\"run_started\"}\n\n"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/runs/{run_id}/decisions/{decision_id}:
    post:
      tags: [Runs]
      summary: 提交人工決策
      operationId: submitRunDecision
      security:
        - ActivationCookie: []
      parameters:
        - $ref: "#/components/parameters/RunId"
        - $ref: "#/components/parameters/DecisionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionSubmit"
      responses:
        "200":
          description: 更新後的 Run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunState"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/runs/{run_id}/cancel:
    post:
      tags: [Runs]
      summary: 取消 Run
      operationId: cancelRun
      security:
        - ActivationCookie: []
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: 更新後的 Run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunState"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/config:
    get:
      tags: [Configuration]
      summary: 取得系統設定
      operationId: getConfig
      responses:
        "200":
          description: 系統設定
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"
    put:
      tags: [Configuration]
      summary: 更新系統設定
      operationId: updateConfig
      security:
        - ActivationCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigUpdate"
      responses:
        "200":
          description: 設定更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConfigResponse"
                  - type: object
                    properties:
                      saved:
                        type: boolean
                        const: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/secrets/model-api-keys:
    get:
      tags: [Secrets]
      summary: 取得模型 API Key 狀態
      description: 不會回傳 API Key 原文。
      operationId: getModelApiKeys
      responses:
        "200":
          description: Provider 狀態
          content:
            application/json:
              schema:
                type: object
                required: [providers]
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/ModelApiKeyStatus"
    put:
      tags: [Secrets]
      summary: 儲存模型 API Key
      operationId: updateModelApiKey
      security:
        - ActivationCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelApiKeyUpdate"
            example:
              provider: openai
              api_key: sk-example
      responses:
        "200":
          description: API Key 已儲存並重設為未測試
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelApiKeyStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/secrets/model-api-keys/test:
    post:
      tags: [Secrets]
      summary: 測試模型 API Key
      operationId: testModelApiKey
      security:
        - ActivationCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelApiKeyTest"
      responses:
        "200":
          description: 測試結果；無效 Key 仍以 200 回傳並將 valid 設為 false
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelApiKeyStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/secrets/model-api-keys/{provider}:
    delete:
      tags: [Secrets]
      summary: 刪除模型 API Key
      operationId: deleteModelApiKey
      security:
        - ActivationCookie: []
      parameters:
        - $ref: "#/components/parameters/Provider"
      responses:
        "200":
          description: API Key 刪除結果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ModelApiKeyStatus"
                  - type: object
                    properties:
                      deleted: { type: boolean }
                      removed: { type: boolean }
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/secrets/activation-code:
    get:
      tags: [Secrets]
      summary: 取得啟動狀態
      operationId: getActivationStatus
      responses:
        "200":
          description: 啟動狀態
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivationStatus"
    post:
      tags: [Secrets]
      summary: 使用啟動碼啟動寫入權限
      operationId: activate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivationCodePayload"
      responses:
        "200":
          description: 啟動成功並設定 HttpOnly Cookie
          headers:
            Set-Cookie:
              schema: { type: string }
              description: plant_activation Cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivationStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Secrets]
      summary: 移除啟動 Cookie
      operationId: deactivate
      responses:
        "200":
          description: 已移除啟動 Cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivationStatus"

  /api/health:
    get:
      tags: [Health]
      summary: 取得後端健康狀態
      operationId: getHealth
      responses:
        "200":
          description: 健康或降級狀態
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /{project_id}/manual:
    get:
      tags: [Public Manual]
      summary: 取得專案 Manual 首頁
      operationId: getProjectManual
      security: [{ ActivationCookie: [] }, {}]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200": { $ref: "#/components/responses/HtmlFile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /{project_id}/manual/:
    get:
      tags: [Public Manual]
      summary: 取得專案 Manual 首頁（尾斜線）
      operationId: getProjectManualWithTrailingSlash
      security: [{ ActivationCookie: [] }, {}]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200": { $ref: "#/components/responses/HtmlFile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /{project_id}/manual.zip:
    get:
      tags: [Public Manual]
      summary: 下載專案離線 Manual
      operationId: downloadProjectManualZip
      security: [{ ActivationCookie: [] }, {}]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200": { $ref: "#/components/responses/ZipFile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /manual.zip:
    get:
      tags: [Public Manual]
      summary: 下載共用離線 Manual
      operationId: downloadSharedManualZip
      responses:
        "200": { $ref: "#/components/responses/ZipFile" }
        "404": { $ref: "#/components/responses/NotFound" }

  /{project_id}/manual/srs:
    get:
      tags: [Public Manual]
      summary: 取得 SRS HTML
      operationId: getProjectSrs
      security: [{ ActivationCookie: [] }, {}]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200": { $ref: "#/components/responses/HtmlFile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /{project_id}/manual/dr:
    get:
      tags: [Public Manual]
      summary: 取得 Design Rationale HTML
      operationId: getProjectDesignRationale
      security: [{ ActivationCookie: [] }, {}]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200": { $ref: "#/components/responses/HtmlFile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /{project_id}/manual/models/{file_path}:
    get:
      tags: [Public Manual]
      summary: 取得 Manual 模型檔案
      operationId: getProjectManualModelFile
      security: [{ ActivationCookie: [] }, {}]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200": { $ref: "#/components/responses/BinaryFile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /{project_id}/manual/results/{file_path}:
    get:
      tags: [Public Manual]
      summary: 取得 Manual results 檔案
      operationId: getProjectManualResultFile
      security: [{ ActivationCookie: [] }, {}]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200": { $ref: "#/components/responses/BinaryFile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /{project_id}/manual/artifact/{file_path}:
    get:
      tags: [Public Manual]
      summary: 取得 Manual artifact 檔案
      operationId: getProjectManualArtifactFile
      security: [{ ActivationCookie: [] }, {}]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200": { $ref: "#/components/responses/BinaryFile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /{project_id}/manual/output/{file_path}:
    get:
      tags: [Public Manual]
      summary: 取得 Manual output 檔案
      operationId: getProjectManualOutputFile
      security: [{ ActivationCookie: [] }, {}]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200": { $ref: "#/components/responses/BinaryFile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /{project_id}/manual/agent/{file_path}:
    get:
      tags: [Public Manual]
      summary: 取得 Manual Agent 共用資源
      operationId: getProjectManualAgentFile
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200": { $ref: "#/components/responses/BinaryFile" }
        "404": { $ref: "#/components/responses/NotFound" }

  /{project_id}/manual/{file_path}:
    get:
      tags: [Public Manual]
      summary: 取得專案 Manual 檔案
      operationId: getProjectManualFile
      security: [{ ActivationCookie: [] }, {}]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200": { $ref: "#/components/responses/BinaryFile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /manual/{file_path}:
    get:
      tags: [Public Manual]
      summary: 取得共用 Manual 資源
      operationId: getSharedManualFile
      parameters:
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200": { $ref: "#/components/responses/BinaryFile" }
        "404": { $ref: "#/components/responses/NotFound" }

  /{project_id}/{file_path}:
    get:
      tags: [Public Manual]
      summary: 取得專案公開靜態檔案
      description: HTML 檔案不允許透過此路徑讀取。
      operationId: getProjectPublicFile
      security: [{ ActivationCookie: [] }, {}]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200": { $ref: "#/components/responses/BinaryFile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    ActivationCookie:
      type: apiKey
      in: cookie
      name: plant_activation
      description: 透過 POST /api/secrets/activation-code 取得的 HttpOnly Cookie

  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema: { type: string }
      example: "173949223214"
    RunId:
      name: run_id
      in: path
      required: true
      schema: { type: string, pattern: "^run_[A-Za-z0-9]+$" }
    DecisionId:
      name: decision_id
      in: path
      required: true
      schema: { type: string }
    ReferenceName:
      name: name
      in: path
      required: true
      schema: { type: string }
      example: 規定.docx
    FilePath:
      name: file_path
      in: path
      required: true
      schema: { type: string }
    Provider:
      name: provider
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Provider"
    Inline:
      name: inline
      in: query
      required: false
      schema: { type: boolean, default: false }
      description: true 時以 inline Content-Disposition 回傳

  responses:
    BadRequest:
      description: 請求資料或操作條件不合法
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Forbidden:
      description: 缺少啟動權限或專案目前不可公開讀取
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example: { detail: 需要啟動碼才能執行此操作 }
    NotFound:
      description: 找不到指定資源
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Conflict:
      description: 資源狀態衝突，例如專案已有執行中的 Run
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    ValidationError:
      description: FastAPI/Pydantic 請求格式驗證失敗
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ValidationError" }
    InternalServerError:
      description: 伺服器內部錯誤
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    BinaryFile:
      description: 檔案內容；實際 Content-Type 依副檔名決定
      content:
        application/octet-stream:
          schema: { type: string, format: binary }
    HtmlFile:
      description: HTML 文件
      content:
        text/html:
          schema: { type: string }
    ZipFile:
      description: ZIP 壓縮檔
      content:
        application/zip:
          schema: { type: string, format: binary }

  schemas:
    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          description: 錯誤訊息或詳細資料
          oneOf:
            - type: string
            - type: object
              additionalProperties: true

    ValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            type: object
            additionalProperties: true

    ProjectCreate:
      type: object
      required: [rough_idea]
      properties:
        rough_idea:
          type: string
          minLength: 1

    ProjectCreated:
      type: object
      required: [project_id, rough_idea]
      properties:
        project_id: { type: string }
        rough_idea: { type: string }

    ProjectSummary:
      type: object
      required: [project_id]
      properties:
        project_id: { type: string }
        created_at: { type: [string, "null"] }
        rough_idea: { type: [string, "null"] }
        scenario: { type: [string, "null"] }
        has_results: { type: boolean }
        has_cost_summary: { type: boolean }
        status_hint: { type: [string, "null"] }
        active_run:
          oneOf:
            - $ref: "#/components/schemas/ActiveRunSummary"
            - type: "null"
      additionalProperties: true

    ProjectResponse:
      type: object
      required: [project_id, project]
      properties:
        project_id: { type: string }
        project:
          type: object
          additionalProperties: true

    DeleteProjectResponse:
      type: object
      required: [project_id, deleted]
      properties:
        project_id: { type: string }
        deleted: { type: boolean, const: true }

    BootstrapResponse:
      type: object
      required:
        - config
        - model_summary
        - api_keys
        - projects
        - active_runs
        - interrupted_run_count
        - formal_meeting_enabled
        - requires_rounds_input
      properties:
        config:
          $ref: "#/components/schemas/LoadStatus"
        model_summary: { type: string }
        api_keys:
          $ref: "#/components/schemas/ApiKeySummary"
        activated: { type: boolean }
        projects:
          type: array
          items: { $ref: "#/components/schemas/ProjectSummary" }
        active_runs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ActiveRunSummary"
        interrupted_run_count: { type: integer, minimum: 0 }
        formal_meeting_enabled: { type: boolean }
        requires_rounds_input: { type: boolean }

    LoadStatus:
      type: object
      required: [loaded]
      properties:
        loaded: { type: boolean }
        error: { type: [string, "null"] }

    ApiKeySummary:
      type: object
      required: [valid]
      properties:
        valid: { type: boolean }
        error: { type: [string, "null"] }

    ReferenceInfo:
      type: object
      required: [name, size]
      properties:
        name: { type: string }
        size: { type: integer, minimum: 0 }

    ReferenceListResponse:
      type: object
      required: [project_id, references]
      properties:
        project_id: { type: string }
        references:
          type: array
          items: { $ref: "#/components/schemas/ReferenceInfo" }

    ReferenceMutationResponse:
      type: object
      properties:
        project_id: { type: string }
        name: { type: string }
        size: { type: integer }
        saved: { type: boolean }
        deleted: { type: boolean }
      additionalProperties: true

    FileTreeNode:
      type: object
      required: [path, name, kind]
      properties:
        path: { type: string }
        name: { type: string }
        kind: { type: string, enum: [file, directory] }
        size: { type: [integer, "null"] }
        editable: { type: boolean }
        previewable: { type: boolean }

    ArtifactTreeResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/FileTreeNode" }

    FileContent:
      type: object
      required: [path, type, encoding, content, editable, readonly]
      properties:
        path: { type: string }
        type: { type: string }
        encoding: { type: string, enum: [utf-8, base64] }
        content: { type: string }
        editable: { type: boolean }
        readonly: { type: boolean }
        mime: { type: string }

    CostSummaryResponse:
      type: object
      required: [project_id, cost_summary]
      properties:
        project_id: { type: string }
        cost_summary:
          type: object
          additionalProperties: true

    RunStatus:
      type: string
      enum:
        - queued
        - running
        - waiting_for_human
        - cancelling
        - completed
        - failed
        - cancelled
        - interrupted

    ActiveRunSummary:
      type: object
      required: [run_id, status]
      properties:
        run_id: { type: string }
        status: { $ref: "#/components/schemas/RunStatus" }
        pending_decision:
          oneOf:
            - $ref: "#/components/schemas/PendingDecision"
            - type: "null"

    RunCreate:
      type: object
      required: [project_id]
      properties:
        project_id: { type: string }
        mode: { type: string, enum: [new, continue], default: continue }
        rounds: { type: [integer, "null"], minimum: 1 }
        max_issues: { type: [integer, "null"], minimum: 1 }
        rough_idea: { type: [string, "null"] }
        attached_reference_paths:
          type: [array, "null"]
          items: { type: string }
        enable_agents:
          type: [object, "null"]
          additionalProperties: { type: boolean }
        stage_overrides:
          type: [object, "null"]
          additionalProperties: { type: boolean }

    RunState:
      type: object
      required: [run_id, project_id, mode, status]
      properties:
        run_id: { type: string }
        project_id: { type: string }
        mode: { type: string, enum: [new, continue] }
        status: { $ref: "#/components/schemas/RunStatus" }
        current_stage: { type: string }
        current_agent: { type: string }
        round: { type: [integer, "null"] }
        rough_idea: { type: string }
        attached_reference_paths:
          type: array
          items: { type: string }
        requires_rounds_input: { type: boolean }
        pending_decision:
          oneOf:
            - $ref: "#/components/schemas/PendingDecision"
            - type: "null"
        skip_all_human_interventions: { type: boolean }
        cancel_requested: { type: boolean }
        started_at: { type: string, format: date-time }
        finished_at: { type: [string, "null"], format: date-time }
        error: { type: [string, "null"] }
        event_count: { type: integer, minimum: 0 }
        run_checkpoint:
          oneOf:
            - $ref: "#/components/schemas/RunCheckpoint"
            - type: "null"
      additionalProperties: true

    RunCheckpoint:
      type: object
      required: [status, stage_id, run_id]
      properties:
        status: { type: string }
        stage_id: { type: string }
        step_id: { type: string }
        run_id: { type: string }
        error: { type: string }
        dirty_outputs:
          type: array
          items: { type: string }
        last_round: { type: integer }
        round: { type: integer }
        issue_id: { type: string }
        agent: { type: string }
        action: { type: string }
        resume_policy: { type: string }
        created_at: { type: string, format: date-time }

    PendingDecision:
      type: object
      required: [id, kind, title, description]
      properties:
        id: { type: string }
        kind:
          type: string
          enum:
            - stakeholder_selection
            - human_decision
            - stakeholder_statement_review
            - requirements_review
            - domain_research_review
            - scope_review
            - meeting_issue_proposal_review
        title: { type: string }
        description: { type: string }
        proposed:
          type: array
          items:
            type: object
            additionalProperties: true
        max_select: { type: integer }
        issue:
          type: object
          additionalProperties: true
        options:
          type: object
          additionalProperties: true

    DecisionSubmit:
      type: object
      required: [payload]
      properties:
        payload:
          type: object
          additionalProperties: true
      example:
        payload:
          action: approve

    RunEvent:
      type: object
      required: [id, type]
      properties:
        id: { type: integer, minimum: 0 }
        type: { type: string }
        message: { type: string }
        level: { type: string }
        timestamp: { type: string, format: date-time }
        stage_id: { type: string }
        step_id: { type: string }
        agent: { type: string }
        action: { type: string }
        title: { type: string }
        status: { type: string }
        output_path: { type: string }
        delta_type: { type: string }
        content: true
        summary:
          type: object
          additionalProperties: true
        decision_id: { type: string }
        decision: { $ref: "#/components/schemas/PendingDecision" }
        payload:
          type: object
          additionalProperties: true
        attached_reference_paths:
          type: array
          items: { type: string }
        error: { type: string }
      additionalProperties: true

    RunEventsResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items: { $ref: "#/components/schemas/RunEvent" }

    PlantConfig:
      type: object
      properties:
        rounds: { type: integer, minimum: 1 }
        max_issues: { type: integer, minimum: 1 }
        stage:
          type: object
          additionalProperties: { type: boolean }
        export:
          type: object
          additionalProperties: { type: boolean }
        enable_agents:
          type: object
          additionalProperties: { type: boolean }
        enable_meeting:
          type: object
          additionalProperties: { type: boolean }
        enable_tools:
          type: object
          additionalProperties: { type: boolean }
        agent_models:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/AgentModelConfig"
      additionalProperties: true

    AgentModelConfig:
      type: object
      required: [provider, model]
      properties:
        provider: { $ref: "#/components/schemas/Provider" }
        model: { type: string }
        temperature: { type: number }

    ConfigResponse:
      type: object
      required: [config]
      properties:
        config: { $ref: "#/components/schemas/PlantConfig" }

    ConfigUpdate:
      type: object
      required: [config]
      properties:
        config: { $ref: "#/components/schemas/PlantConfig" }

    Provider:
      type: string
      enum: [openai, claude, gemini]

    ApiKeyValidationStatus:
      type: string
      enum: [untested, valid, invalid]

    ModelApiKeyStatus:
      type: object
      required: [provider, env_key, configured, status, valid]
      properties:
        provider: { $ref: "#/components/schemas/Provider" }
        env_key: { type: string }
        configured: { type: boolean }
        status: { $ref: "#/components/schemas/ApiKeyValidationStatus" }
        valid: { type: boolean }
        error: { type: [string, "null"] }
        tested_at: { type: [string, "null"], format: date-time }
      additionalProperties: true

    ModelApiKeyUpdate:
      type: object
      required: [provider, api_key]
      properties:
        provider: { $ref: "#/components/schemas/Provider" }
        api_key:
          type: string
          minLength: 1
          writeOnly: true

    ModelApiKeyTest:
      type: object
      required: [provider]
      properties:
        provider: { $ref: "#/components/schemas/Provider" }

    ActivationCodePayload:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 1
          writeOnly: true

    ActivationStatus:
      type: object
      required: [activated]
      properties:
        activated: { type: boolean }

    HealthResponse:
      type: object
      required: [status, config, api_keys, projects_dir]
      properties:
        status: { type: string, enum: [ok, degraded] }
        config:
          type: object
          properties:
            loaded: { type: boolean }
            error: { type: [string, "null"] }
        api_keys:
          type: object
          properties:
            valid: { type: boolean }
            error: { type: [string, "null"] }
        projects_dir:
          type: object
          properties:
            exists: { type: boolean }
            writable: { type: boolean }
